name: Sync ESPN (Copa 2026)

# Roda a cada 1 hora puxando placares + scout da ESPN (grátis, sem chave).
# Pré-requisitos (1x): repositório no GitHub + secrets DATABASE_URL e DIRECT_URL.
on:
  schedule:
    - cron: "0 * * * *" # de hora em hora (horário UTC)
  workflow_dispatch: # permite rodar na mão pelo painel do GitHub
    inputs:
      since_hours:
        description: "Backfill: re-processar scout dos jogos das últimas N horas (padrão 6). Use 72 p/ recalcular ontem."
        required: false
        default: "6"

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-espn
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: node scripts/sync-espn.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SYNC_SINCE_HOURS: ${{ github.event.inputs.since_hours || '6' }}
      # Preenche as fotos dos jogadores (ESPN + API-Football), incremental e prioriza escalados/preço.
      # Só roda a parte da API-Football se o secret APIFOOTBALL_KEY existir; é resumível e respeita a cota.
      - run: node scripts/backfill-photos.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
