name: Sync ESPN (Copa 2026)

# Roda a cada 30 minutos puxando placares + scout da ESPN (grátis, sem chave).
# Pré-requisitos (1x): repositório no GitHub + secrets DATABASE_URL e DIRECT_URL.
on:
  schedule:
    - cron: "*/30 * * * *" # a cada 30 min (horário UTC)
  workflow_dispatch: {} # permite rodar na mão pelo painel do GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-espn
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: node scripts/sync-espn.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
